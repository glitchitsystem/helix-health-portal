name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  TEST_DB_PATH: db/helix.test.db

jobs:
  # ── Job 1: Install & Build ───────────────────────────────────────────────────
  install-build:
    name: Install & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build server
        run: npm run build --workspace=server

      - name: Build client
        run: npm run build --workspace=client

  # ── Job 2: Lint & Type-check ─────────────────────────────────────────────────
  lint-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    needs: install-build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (server)
        run: npm run lint --workspace=server --if-present

      - name: Lint (client)
        run: npm run lint --workspace=client --if-present

      - name: Type-check (server)
        run: npx tsc --noEmit --project server/tsconfig.json

      - name: Type-check (client)
        run: npx tsc --noEmit --project client/tsconfig.json

  # ── Job 3: Unit Tests ─────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Jest)
    runs-on: ubuntu-latest
    needs: install-build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npx jest --config jest.unit.config.ts --coverage --ci
        env:
          NODE_ENV: test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: coverage/

  # ── Job 4: Integration Tests ──────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests (Jest + Supertest)
    runs-on: ubuntu-latest
    needs: install-build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Seed test database
        run: npm run seed
        env:
          NODE_ENV: test
          DATABASE_PATH: ${{ env.TEST_DB_PATH }}

      - name: Run integration tests
        run: npx jest --config jest.integration.config.ts --ci
        env:
          NODE_ENV: test
          TEST_DB_PATH: ${{ env.TEST_DB_PATH }}
          JWT_SECRET: ci-test-secret-do-not-use-in-production
          REFRESH_SECRET: ci-test-refresh-secret-do-not-use

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: test-results/integration/

  # ── Job 5: E2E Tests (Chromium only for PR) ────────────────────────────────
  e2e-tests:
    name: E2E Tests (Playwright / Chromium)
    runs-on: ubuntu-latest
    needs: install-build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install chromium --with-deps

      - name: Seed database
        run: npm run seed
        env:
          NODE_ENV: test

      - name: Start server
        run: |
          npm run dev --workspace=server &
          npx wait-on http://localhost:4000/api/health --timeout 30000
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-do-not-use-in-production
          REFRESH_SECRET: ci-test-refresh-secret-do-not-use
          PORT: 4000

      - name: Start client
        run: |
          npm run dev --workspace=client &
          npx wait-on http://localhost:3000 --timeout 30000
        env:
          VITE_API_URL: http://localhost:4000

      - name: Run Playwright E2E tests (Chromium)
        run: npx playwright test --project=chromium
        env:
          BASE_URL: http://localhost:3000
          CI: true

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            playwright-report/
            test-results/
