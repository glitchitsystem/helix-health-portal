name: Helix CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Install dependencies once and cache them for downstream jobs
  # ──────────────────────────────────────────────────────────────────────────
  install-cache:
    name: Install & Cache Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install root and workspace dependencies
        run: npm ci

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            client/node_modules
            server/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Unit tests (Jest + prescriptionValidation, pure functions)
  # ──────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: install-cache

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            client/node_modules
            server/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Run unit tests
        run: npx jest --config jest.unit.config.ts --coverage --ci
        env:
          NODE_ENV: test

      - name: Upload unit test coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-${{ github.sha }}
          path: coverage/unit/
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3: Integration tests (Jest + supertest, hits real SQLite)
  # ──────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: install-cache

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            client/node_modules
            server/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Run integration tests
        run: npx jest --config jest.integration.config.ts --coverage --ci --forceExit
        env:
          NODE_ENV: test
          TEST_DB_PATH: ${{ github.workspace }}/db/helix.test.db
          DATABASE_PATH: ${{ github.workspace }}/db/helix.test.db
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          REFRESH_SECRET: ${{ secrets.REFRESH_SECRET }}
          MOCK_EMAIL: "true"
          MOCK_SMS: "true"
          MOCK_TOTP: "true"

      - name: Upload integration test coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage-${{ github.sha }}
          path: coverage/integration/
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # Job 4: E2E tests (Playwright, headless Chromium, full stack)
  # ──────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            client/node_modules
            server/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build client
        run: npm run build --workspace=client
        env:
          VITE_API_URL: http://localhost:4000/api

      - name: Start API server (background)
        run: npm run start --workspace=server &
        env:
          NODE_ENV: test
          PORT: 4000
          TEST_DB_PATH: ${{ github.workspace }}/db/helix.test.db
          DATABASE_PATH: ${{ github.workspace }}/db/helix.test.db
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          REFRESH_SECRET: ${{ secrets.REFRESH_SECRET }}
          CLIENT_ORIGIN: http://localhost:5173
          MOCK_EMAIL: "true"
          MOCK_SMS: "true"
          MOCK_TOTP: "true"

      - name: Wait for API to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4000/api/health; then
              echo "API is ready"
              break
            fi
            echo "Waiting for API... attempt $i/30"
            sleep 2
          done

      - name: Run Playwright E2E tests
        run: npx playwright test --config playwright.config.ts
        env:
          BASE_URL: http://localhost:4000
          CI: "true"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: playwright-report/
          retention-days: 30

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ github.sha }}
          path: test-results/
          retention-days: 14
