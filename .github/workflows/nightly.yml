name: Nightly — Full Test Suite

# Runs at 02:00 UTC every night (10 PM ET)
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch: # allow manual trigger

env:
  NODE_VERSION: "20"

jobs:
  full-unit-tests:
    name: Unit Tests (all)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npx jest --config jest.unit.config.ts --coverage --ci
        env:
          NODE_ENV: test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: nightly-unit-coverage
          path: coverage/

  full-integration-tests:
    name: Integration Tests (all)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Seed test database
        run: npm run seed
        env:
          NODE_ENV: test

      - name: Run integration tests
        run: npx jest --config jest.integration.config.ts --ci
        env:
          NODE_ENV: test
          JWT_SECRET: nightly-ci-test-secret-not-for-production
          REFRESH_SECRET: nightly-ci-refresh-secret-not-for-production

  full-e2e-chromium:
    name: E2E Tests — Chromium
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install chromium --with-deps

      - name: Seed database
        run: npm run seed
        env:
          NODE_ENV: test

      - name: Start server & client
        run: |
          npm run dev --workspace=server &
          npx wait-on http://localhost:4000/api/health --timeout 30000
          npm run dev --workspace=client &
          npx wait-on http://localhost:3000 --timeout 30000
        env:
          NODE_ENV: test
          JWT_SECRET: nightly-ci-test-secret-not-for-production
          REFRESH_SECRET: nightly-ci-refresh-secret-not-for-production
          PORT: 4000
          VITE_API_URL: http://localhost:4000

      - name: Run E2E (Chromium)
        run: npx playwright test --project=chromium
        env:
          BASE_URL: http://localhost:3000
          CI: true

      - name: Upload Chromium report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-e2e-chromium
          path: playwright-report/

  full-e2e-firefox:
    name: E2E Tests — Firefox
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Firefox)
        run: npx playwright install firefox --with-deps

      - name: Seed database
        run: npm run seed
        env:
          NODE_ENV: test

      - name: Start server & client
        run: |
          npm run dev --workspace=server &
          npx wait-on http://localhost:4000/api/health --timeout 30000
          npm run dev --workspace=client &
          npx wait-on http://localhost:3000 --timeout 30000
        env:
          NODE_ENV: test
          JWT_SECRET: nightly-ci-test-secret-not-for-production
          REFRESH_SECRET: nightly-ci-refresh-secret-not-for-production
          PORT: 4000
          VITE_API_URL: http://localhost:4000

      - name: Run E2E (Firefox)
        run: npx playwright test --project=firefox
        env:
          BASE_URL: http://localhost:3000
          CI: true

      - name: Upload Firefox report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-e2e-firefox
          path: playwright-report/

  full-e2e-webkit:
    name: E2E Tests — WebKit (Safari)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (WebKit)
        run: npx playwright install webkit --with-deps

      - name: Seed database
        run: npm run seed
        env:
          NODE_ENV: test

      - name: Start server & client
        run: |
          npm run dev --workspace=server &
          npx wait-on http://localhost:4000/api/health --timeout 30000
          npm run dev --workspace=client &
          npx wait-on http://localhost:3000 --timeout 30000
        env:
          NODE_ENV: test
          JWT_SECRET: nightly-ci-test-secret-not-for-production
          REFRESH_SECRET: nightly-ci-refresh-secret-not-for-production
          PORT: 4000
          VITE_API_URL: http://localhost:4000

      - name: Run E2E (WebKit)
        run: npx playwright test --project=webkit
        env:
          BASE_URL: http://localhost:3000
          CI: true

      - name: Upload WebKit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-e2e-webkit
          path: playwright-report/

  nightly-health-report:
    name: Generate Nightly Health Report
    runs-on: ubuntu-latest
    needs: [full-unit-tests, full-integration-tests, full-e2e-chromium, full-e2e-firefox, full-e2e-webkit]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: nightly-artifacts/

      - name: Generate health report
        run: |
          echo "# Helix Health Portal — Nightly Report $(date -u +%Y-%m-%d)" > nightly-report.md
          echo "" >> nightly-report.md
          echo "| Suite | Status |" >> nightly-report.md
          echo "|---|---|" >> nightly-report.md
          echo "| Unit Tests | ${{ needs.full-unit-tests.result }} |" >> nightly-report.md
          echo "| Integration Tests | ${{ needs.full-integration-tests.result }} |" >> nightly-report.md
          echo "| E2E Chromium | ${{ needs.full-e2e-chromium.result }} |" >> nightly-report.md
          echo "| E2E Firefox | ${{ needs.full-e2e-firefox.result }} |" >> nightly-report.md
          echo "| E2E WebKit | ${{ needs.full-e2e-webkit.result }} |" >> nightly-report.md
          cat nightly-report.md

      - name: Upload nightly report
        uses: actions/upload-artifact@v4
        with:
          name: nightly-health-report
          path: nightly-report.md
