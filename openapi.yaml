        - bearerAuth: []
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Revenue report data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'

  /admin/audit-log:
    get:
      tags: [Admin]
      summary: PHI access audit log (admin only)
      operationId: listAuditLog
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: query
