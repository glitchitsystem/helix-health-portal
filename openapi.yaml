            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [active, discontinued, completed, on_hold, all]
      responses:
        '200':
          description: Prescription list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Prescription'

    post:
      tags: [Prescriptions]
      summary: Create a prescription (provider/admin only)
      operationId: createPrescription
      security:
        - bearerAuth: []
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [drug_name, dosage, frequency, start_date]
              properties:
                drug_name:
                  type: string
                  example: Metformin
                drug_ndc:
                  type: string
                  nullable: true
                dosage:
                  type: string
                  example: 500mg
                frequency:
                  type: string
                  example: twice daily
                route:
                  type: string
                  default: oral
                quantity:
                  type: integer
                  default: 30
                refills_remaining:
                  type: integer
                  default: 0
                start_date:
                  type: string
                  format: date
                end_date:
                  type: string
                  format: date
                  nullable: true
                is_controlled:
                  type: integer
                  enum: [0, 1]
                  default: 0
                schedule_class:
                  type: string
                  nullable: true
                  enum: [II, III, IV, V]
                pharmacy_name:
                  type: string
                  nullable: true
                pharmacy_phone:
                  type: string
                  nullable: true
                notes:
                  type: string
                  nullable: true
      responses:
        '201':
          description: Prescription created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Prescription'
                      warnings:
                        type: array
                        items:
                          type: string
                        description: Drug interaction warnings (if any)
        '400':
          description: Validation error (missing fields or dosage exceeds max)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Provider record not found or insufficient role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

