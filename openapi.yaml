openapi: 3.0.3
info:
  title: Helix Health Portal API
  description: |
    RESTful API for the Helix Health Portal outpatient patient portal.
    Used as the sample application for the QA automation course.
  version: 1.0.0
  contact:
    name: Helix Health Portal

servers:
  - url: http://localhost:4000/api
    description: Local development server

tags:
  - name: Health
    description: Server health check
  - name: Auth
    description: Authentication and authorisation
  - name: Patients
    description: Patient demographics and management
  - name: Appointments
    description: Scheduling and appointment lifecycle
  - name: Medical Records
    description: Diagnoses, medications, allergies, vitals, labs, notes, documents
  - name: Prescriptions
    description: Prescription management and refill requests
  - name: Drug Interactions
    description: Drug-drug interaction checking
  - name: Messages
    description: Secure patient-provider messaging
  - name: Notifications
    description: In-app notification management
  - name: Billing
    description: Invoices, payments, disputes, and payment plans
  - name: Insurance
    description: Patient insurance plan management
  - name: Search
    description: Global search across patients and appointments
  - name: Admin
    description: Administrative reports and user management

# ─── Security scheme ──────────────────────────────────────────────────────────
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiSuccess:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object

    ApiError:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: "Invalid credentials"

    AuthUser:
      type: object
      required: [id, email, roles]
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: patient1@helixhealthportal.test
        roles:
          type: array
          items:
            type: string
          example: ["patient"]

    LoginSuccessData:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: '#/components/schemas/AuthUser'

    LoginMfaData:
      type: object
      required: [mfaRequired, mfaChallengeToken]
      properties:
        mfaRequired:
          type: boolean
          example: true
        mfaChallengeToken:
          type: string

    Patient:
      type: object
      properties:
        id:
          type: integer
          example: 1
        mrn:
          type: string
          example: MRN-TEST-00001
        firstName:
          type: string
          example: TEST_Patient
        lastName:
          type: string
          example: One
        dob:
          type: string
          format: date
          example: "1985-06-15"
        gender:
          type: string
          enum: [male, female, other, prefer_not_to_say]
        phone:
          type: string
          example: "555-123-4567"
        email:
          type: string
          format: email

    Appointment:
      type: object
      properties:
        id:
          type: integer
        patientId:
          type: integer
        providerId:
          type: integer
        appointmentTypeId:
          type: integer
        appointmentTypeName:
          type: string
          example: Follow-up
        scheduledAt:
          type: string
          format: date-time
        durationMinutes:
          type: integer
          example: 30
        status:
          type: string
          enum: [scheduled, confirmed, completed, cancelled, no_show]
        location:
          type: string
          example: Room 101
        notes:
          type: string
        createdAt:
          type: string
          format: date-time

    Diagnosis:
      type: object
      properties:
        id:
          type: integer
        patientId:
          type: integer
        icd10Code:
          type: string
          example: E11.9
        icd10Description:
          type: string
          example: Type 2 Diabetes Mellitus without complications
        status:
          type: string
          enum: [active, resolved, inactive, chronic]
        severity:
          type: string
          enum: [mild, moderate, severe]
        onsetDate:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time

    Medication:
      type: object
      properties:
        id:
          type: integer
        patientId:
          type: integer
        name:
          type: string
          example: Metformin
        dosage:
          type: string
          example: 500mg
        frequency:
          type: string
          example: Twice daily
        route:
          type: string
          example: oral
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
          nullable: true
        status:
          type: string
          enum: [active, discontinued, completed, on_hold]

    Allergy:
      type: object
      properties:
        id:
          type: integer
        patientId:
          type: integer
        allergen:
          type: string
          example: Penicillin
        reactionType:
          type: string
          example: anaphylaxis
        severity:
          type: string
          enum: [mild, moderate, severe]
        status:
          type: string
          enum: [active, inactive, resolved]

    VitalSigns:
      type: object
      properties:
        id:
          type: integer
        patientId:
          type: integer
        recordedAt:
          type: string
          format: date-time
        bpSystolic:
          type: integer
          example: 120
        bpDiastolic:
          type: integer
          example: 80
        heartRate:
          type: integer
          example: 72
        temperature:
          type: number
          example: 37.1
        weightKg:
          type: number
          example: 80.5
        heightCm:
          type: number
          example: 175
        o2Saturation:
          type: number
          example: 98.5

    LabResult:
      type: object
      properties:
        id:
          type: integer
        patientId:
          type: integer
        testName:
          type: string
          example: HbA1c
        value:
          type: string
          example: "7.8"
        unit:
          type: string
          example: "%"
        referenceRangeLow:
          type: number
          nullable: true
        referenceRangeHigh:
          type: number
          nullable: true
        collectedAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [pending, final, flagged_high, flagged_low, cancelled]

    ClinicalNote:
      type: object
      properties:
        id:
          type: integer
        patientId:
          type: integer
        providerId:
          type: integer
        noteType:
          type: string
          enum: [progress, intake, discharge, referral]
        subjective:
          type: string
        objective:
          type: string
        assessment:
          type: string
        plan:
          type: string
        isLocked:
          type: boolean
        createdAt:
          type: string
          format: date-time

    Prescription:
      type: object
      properties:
        id:
          type: integer
        patientId:
          type: integer
        prescriberId:
          type: integer
        drugName:
          type: string
          example: Metformin
        drugNdc:
          type: string
          nullable: true
        dosage:
          type: string
          example: 500mg
        frequency:
          type: string
          example: twice daily
        route:
          type: string
          example: oral
        quantity:
          type: integer
          example: 30
        refillsRemaining:
          type: integer
          example: 3
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
          nullable: true
        status:
          type: string
          enum: [active, discontinued, completed, on_hold]
        isControlled:
          type: boolean
        scheduleClass:
          type: string
          nullable: true
          enum: [II, III, IV, V]
        pharmacyName:
          type: string
          nullable: true
        pharmacyPhone:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true

    Message:
      type: object
      properties:
        id:
          type: integer
        threadId:
          type: integer
        senderId:
          type: integer
        body:
          type: string
        createdAt:
          type: string
          format: date-time
        isRead:
          type: boolean

    MessageThread:
      type: object
      properties:
        id:
          type: integer
        subject:
          type: string
        createdBy:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        participantIds:
          type: array
          items:
            type: integer

    Notification:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        type:
          type: string
        title:
          type: string
        body:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time

    Invoice:
      type: object
      properties:
        id:
          type: integer
        patientId:
          type: integer
        appointmentId:
          type: integer
          nullable: true
        status:
          type: string
          enum: [pending, paid, overdue, cancelled, disputed]
        totalAmount:
          type: number
          example: 500.00
        insuranceAmount:
          type: number
          example: 260.00
        patientAmount:
          type: number
          example: 240.00
        dueDate:
          type: string
          format: date
        paidAt:
          type: string
          format: date-time
          nullable: true

    InsurancePlan:
      type: object
      properties:
        id:
          type: integer
        patientId:
          type: integer
        insurerName:
          type: string
          example: Blue Cross Blue Shield
        planName:
          type: string
          example: PPO Gold
        memberId:
          type: string
        groupNumber:
          type: string
        effectiveDate:
          type: string
          format: date
        expirationDate:
          type: string
          format: date
          nullable: true
        copayAmount:
          type: number
        deductibleAmount:
          type: number

    Pagination:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        perPage:
          type: integer
        totalPages:
          type: integer

# ─── Paths ────────────────────────────────────────────────────────────────────
paths:

  /health:
    get:
      tags: [Health]
      summary: Server health check
      operationId: getHealth
      responses:
        '200':
          description: Server is up
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status:
                            type: string
                            example: ok
                          timestamp:
                            type: string
                            format: date-time

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new patient account
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: new.patient@example.com
                password:
                  type: string
                  minLength: 8
                  example: TestPass123!
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          message:
                            type: string
                          userId:
                            type: integer
                          mrn:
                            type: string
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate with email and password
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: patient1@helixhealthportal.test
                password:
                  type: string
                  example: TestPass123!
      responses:
        '200':
          description: Login successful (or MFA required)
          content:
            application/json:
              schema:
                oneOf:
                  - allOf:
                      - $ref: '#/components/schemas/ApiSuccess'
                      - type: object
                        properties:
                          data:
                            $ref: '#/components/schemas/LoginSuccessData'
                  - allOf:
                      - $ref: '#/components/schemas/ApiSuccess'
                      - type: object
                        properties:
                          data:
                            $ref: '#/components/schemas/LoginMfaData'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Account inactive or email not verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '429':
          description: Account locked (too many failed attempts)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke refresh token and log out
      operationId: logout
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Exchange a refresh token for a new access token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: New token pair
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          accessToken:
                            type: string
                          refreshToken:
                            type: string
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /auth/mfa/setup:
    post:
      tags: [Auth]
      summary: Generate a TOTP secret and QR code for MFA setup
      operationId: mfaSetup
      security:
        - bearerAuth: []
      responses:
        '200':
          description: TOTP secret and QR code
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          secret:
                            type: string
                          otpauthUri:
                            type: string
                          qrCodeDataUrl:
                            type: string

  /auth/mfa/verify:
    post:
      tags: [Auth]
      summary: Verify a TOTP code and enable MFA on the account
      operationId: mfaVerify
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  pattern: '^\d{6}$'
                  example: '123456'
      responses:
        '200':
          description: MFA enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
        '400':
          description: Invalid TOTP code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /auth/mfa/validate:
    post:
      tags: [Auth]
      summary: Complete login for MFA-enabled accounts (second step)
      operationId: mfaValidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mfaChallengeToken, code]
              properties:
                mfaChallengeToken:
                  type: string
                code:
                  type: string
                  pattern: '^\d{6}$'
                  example: '123456'
      responses:
        '200':
          description: Login complete
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginSuccessData'
        '401':
          description: Invalid code or expired challenge token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /auth/password-reset/request:
    post:
      tags: [Auth]
      summary: Request a password-reset link (mocked — logged to console)
      operationId: passwordResetRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Reset link sent (always 200 to prevent user enumeration)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'

  /auth/password-reset/confirm:
    post:
      tags: [Auth]
      summary: Confirm password reset with the token from the email link
      operationId: passwordResetConfirm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
                  example: NewTestPass456!
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
        '400':
          description: Validation error (e.g., password complexity)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Invalid or expired reset token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  # ── Patients ─────────────────────────────────────────────────────────────────

  /patients:
    get:
      tags: [Patients]
      summary: List all patients (admin, provider, nurse)
      operationId: listPatients
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Search by name or MRN
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated patient list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Patient'
                      pagination:
                        $ref: '#/components/schemas/Pagination'
        '401':
          description: Unauthorised
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /patients/{patientId}:
    get:
      tags: [Patients]
      summary: Get patient details
      operationId: getPatient
      security:
        - bearerAuth: []
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Patient record
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Patient'
        '403':
          description: Forbidden (patient accessing another patient's record)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Patient not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

    put:
      tags: [Patients]
      summary: Update patient demographics (admin, provider, nurse — or own record)
      operationId: updatePatient
      security:
        - bearerAuth: []
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Patient'
      responses:
        '200':
          description: Updated patient record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
        '404':
          description: Patient not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  # ── Appointments ──────────────────────────────────────────────────────────────

  /appointments:
    get:
      tags: [Appointments]
      summary: List appointments (filtered by role — provider sees all, patient sees own)
      operationId: listAppointments
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [scheduled, confirmed, completed, cancelled, no_show]
        - name: providerId
          in: query
          schema:
            type: integer
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Appointment list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Appointment'

  /patients/{patientId}/appointments:
    get:
      tags: [Appointments]
      summary: List appointments for a specific patient
      operationId: listPatientAppointments
      security:
        - bearerAuth: []
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Patient appointment list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Appointment'
        '404':
          description: Patient not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

    post:
      tags: [Appointments]
      summary: Book an appointment for a patient
      operationId: createAppointment
      security:
        - bearerAuth: []
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [appointmentTypeId, providerId, scheduledAt]
              properties:
                appointmentTypeId:
                  type: integer
                providerId:
                  type: integer
                scheduledAt:
                  type: string
                  format: date-time
                location:
                  type: string
                notes:
                  type: string
      responses:
        '201':
          description: Appointment created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Appointment'
        '409':
          description: Scheduling conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /appointments/{appointmentId}:
    get:
      tags: [Appointments]
      summary: Get a single appointment
      operationId: getAppointment
      security:
        - bearerAuth: []
      parameters:
        - name: appointmentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Appointment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

    patch:
      tags: [Appointments]
      summary: Update appointment status or details
      operationId: updateAppointment
      security:
        - bearerAuth: []
      parameters:
        - name: appointmentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
