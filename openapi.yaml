      summary: Provider utilisation report (admin only)
      operationId: reportUtilisation
      security:
        - bearerAuth: []
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Utilisation report data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
        '403':
          description: Admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /admin/reports/population:
    get:
      tags: [Admin]
      summary: Patient population demographics report
