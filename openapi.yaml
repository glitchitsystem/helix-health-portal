                  type: string
      responses:
        '201':
          description: Dispute filed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'

  # ── Insurance ─────────────────────────────────────────────────────────────────

  /patients/{patientId}/insurance:
    get:
      tags: [Insurance]
      summary: List insurance plans for a patient
      operationId: listInsurancePlans
      security:
        - bearerAuth: []
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Insurance plan list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/InsurancePlan'

    post:
      tags: [Insurance]
      summary: Add an insurance plan
      operationId: createInsurancePlan
      security:
        - bearerAuth: []
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InsurancePlan'
      responses:
        '201':
          description: Insurance plan created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'

  # ── Search ────────────────────────────────────────────────────────────────────

  /search:
    get:
      tags: [Search]
      summary: Global search across patients, appointments, and medications
      operationId: globalSearch
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
          description: Search query (name, MRN, drug name, ICD-10 code, etc.)
        - name: type
          in: query
          schema:
            type: string
            enum: [patients, appointments, medications, all]
            default: all
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          patients:
                            type: array
                            items:
                              $ref: '#/components/schemas/Patient'
                          appointments:
                            type: array
                            items:
                              $ref: '#/components/schemas/Appointment'

